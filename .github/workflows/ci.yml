name: CI

# Runs the node:test suite on every push and pull request so broken changes
# surface before they land on main (deploy.yml only gates on a version bump,
# not on test results).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: npm test
