<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Мафия — Игровой Мастер</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#140a0a" id="themeColorMeta">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mafia">
<link rel="apple-touch-icon" href="./favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@1,400;1,500&family=Oswald:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./src/styles.css">
</head>
<body>
<div class="top-bar">
  <div class="locale-toggle" id="localeToggle" role="group" aria-label="Language">
    <button class="locale-btn" data-locale="uk" title="Українська" aria-label="Українська">🇺🇦</button>
    <button class="locale-btn" data-locale="en" title="English" aria-label="English">🇬🇧</button>
    <button class="locale-btn" data-locale="ru" title="Русский" aria-label="Русский">🇷🇺</button>
  </div>
  <div class="top-bar-actions">
    <button class="fullscreen-toggle" id="fullscreenToggle" aria-label="Fullscreen" title="Fullscreen">
      <span id="fullscreenIcon">⛶</span>
    </button>
    <button class="theme-toggle" id="themeToggle" aria-label="Theme" title="Theme">
      <span id="themeIcon">☾</span>
    </button>
  </div>
</div>
<div class="app" id="app"></div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
