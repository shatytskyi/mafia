<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мафия — Игровой Мастер</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Oswald:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* === СВЕТЛАЯ ТЕМА (по умолчанию) === */
  :root {
    --bg: #f2ead5;            /* кремовая бумага */
    --bg-2: #e8dec5;          /* чуть темнее для карточек */
    --bg-3: #dccfb0;          /* рамки, разделители */
    --paper: #1a1410;         /* тёмный текст (инвертировано) */
    --paper-dark: #0f0a07;    /* самый тёмный */
    --blood: #8b1a1a;         /* бордо */
    --blood-bright: #a82020;
    --gold: #8a6a1f;          /* тёмное золото — хорошо на кремовом */
    --gold-dim: #a88d4a;
    --ash: #6b6460;
    --text: #1a1410;
    --text-dim: #5a4e42;

    /* Специальные цвета для карточки роли (инвертируется на свете) */
    --card-bg-start: #1a1410;
    --card-bg-end: #0f0a07;
    --card-text: #f4ecd8;
    --card-accent: #d4b565;

    --vignette: radial-gradient(ellipse at center, transparent 40%, rgba(101, 75, 40, 0.2) 100%);
    --grain-opacity: 0.08;
    --button-text: #f4ecd8;

    /* Общие альфа-цвета */
    --border-soft: rgba(138, 106, 31, 0.25);
    --border-softer: rgba(138, 106, 31, 0.15);
    --border-softest: rgba(138, 106, 31, 0.08);
    --quote-bg: rgba(26, 20, 16, 0.06);
    --reveal-grad-start: #f4ecd8;
    --reveal-grad-end: #e0d3b0;
    --reveal-shadow: 0 0 30px rgba(138, 106, 31, 0.2), inset 0 0 20px rgba(138, 106, 31, 0.15);
  }

  /* === ТЁМНАЯ ТЕМА === */
  :root[data-theme="dark"] {
    --bg: #0a0807;
    --bg-2: #141110;
    --bg-3: #1e1a17;
    --paper: #f4ecd8;
    --paper-dark: #1a1614;
    --blood: #8b1a1a;
    --blood-bright: #c62828;
    --gold: #c9a961;
    --gold-dim: #8a7444;
    --ash: #6b6460;
    --text: #e8e3d8;
    --text-dim: #a8a196;

    --card-bg-start: #f4ecd8;
    --card-bg-end: #ebe0c7;
    --card-text: #1a1614;
    --card-accent: #8b1a1a;

    --vignette: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    --grain-opacity: 0.06;
    --button-text: #f4ecd8;

    --border-soft: var(--border-soft);
    --border-softer: var(--border-softer);
    --border-softest: var(--border-softest);
    --quote-bg: rgba(0, 0, 0, 0.3);
    --reveal-grad-start: #2a1e1a;
    --reveal-grad-end: #0a0807;
    --reveal-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    position: relative;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: var(--grain-opacity);
    z-index: 100;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    background: var(--vignette);
  }

  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 20px 40px;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* Floating theme toggle */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 50;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--bg-2);
    border: 1px solid var(--border-soft);
    color: var(--gold);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .theme-toggle:active {
    transform: scale(0.92);
    background: var(--gold);
    color: var(--bg);
  }

  /* Анимация появления — только opacity, без translate, чтобы не создавать эффект «прыжка».
     Класс навешивается только при СМЕНЕ ЭКРАНА, а не на каждый рендер. */
  .screen-enter {
    animation: fadeIn 0.35s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Плавное появление элементов внутри экрана (step-card, timer-card и т.п.) */
  .step-card, .timer-card {
    transition: border-color 0.2s ease;
  }

  /* Плавное изменение чипов игроков при смене жив/мёртв */
  .player-chip {
    transition: background 0.2s ease, color 0.2s ease, opacity 0.2s ease, border-color 0.2s ease;
  }

  /* === TYPOGRAPHY === */
  .title {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    font-size: 14px;
    color: var(--gold-dim);
  }

  .hero {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: 72px;
    line-height: 0.9;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    color: var(--paper);
  }

  .hero em {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--blood-bright);
    display: block;
    font-size: 0.7em;
    letter-spacing: 0.02em;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .label {
    font-family: 'Oswald', sans-serif;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--gold-dim);
  }

  /* === HOME SCREEN === */
  .home-header {
    padding-top: 40px;
    margin-bottom: 32px;
  }

  .home-header .ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .home-header .ornament::before,
  .home-header .ornament::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold-dim);
  }

  .home-header .ornament span {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .hero-wrap {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
  }

  .hero-wrap .year {
    position: absolute;
    top: -12px;
    right: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ash);
    letter-spacing: 0.1em;
  }

  .home-header .tag {
    text-align: center;
    margin-top: 20px;
  }

  /* === SECTIONS === */
  .section {
    margin-bottom: 36px;
  }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-head .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--gold);
  }

  .section-head .line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--gold-dim), transparent);
  }

  /* === PLAYER COUNTER === */
  .counter {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 32px 24px;
    background: var(--bg-2);
    border: 1px solid var(--border-soft);
    position: relative;
  }

  .counter::before, .counter::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border: 1px solid var(--gold);
  }
  .counter::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .counter::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  .counter-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--gold);
    font-size: 24px;
    font-family: 'Oswald', sans-serif;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 300;
  }

  .counter-btn:active {
    background: var(--gold);
    color: var(--bg);
    transform: scale(0.95);
  }

  .counter-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .counter-num {
    font-family: 'Oswald', sans-serif;
    font-size: 84px;
    font-weight: 300;
    line-height: 1;
    color: var(--paper);
    min-width: 120px;
    text-align: center;
  }

  .counter-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-dim);
    text-align: center;
    margin-top: 8px;
  }

  /* === ROLE DISTRIBUTION === */
  .role-dist {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border-softer);
    border: 1px solid var(--border-softer);
  }

  .role-dist .cell {
    background: var(--bg-2);
    padding: 16px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .role-dist .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .role-dist .dot.mafia { background: var(--blood-bright); box-shadow: 0 0 8px rgba(198, 40, 40, 0.5); }
  .role-dist .dot.civilian { background: var(--paper); }
  .role-dist .dot.sheriff { background: var(--gold); box-shadow: 0 0 8px var(--border-soft); }
  .role-dist .dot.doctor { background: #5a9b8e; }
  .role-dist .dot.don { background: #6b0000; box-shadow: 0 0 10px rgba(139, 26, 26, 0.8); }
  .role-dist .dot.maniac { background: #8e5a9b; }
  .role-dist .dot.whore { background: #c77d9e; }

  .role-dist .txt {
    flex: 1;
  }

  .role-dist .role-name {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
  }

  .role-dist .role-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--gold);
    font-weight: 500;
  }

  /* === OPTIONAL ROLES === */
  .role-toggle {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 18px 16px;
    background: var(--bg-2);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 8px;
    position: relative;
  }

  .role-toggle:active { transform: scale(0.99); }

  .role-toggle.active {
    border-color: var(--gold);
    background: linear-gradient(to right, var(--border-softest), transparent);
  }

  .role-toggle.disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .role-toggle .check {
    width: 22px;
    height: 22px;
    border: 1px solid var(--gold-dim);
    flex-shrink: 0;
    margin-top: 2px;
    position: relative;
    transition: all 0.2s;
  }

  .role-toggle.active .check {
    background: var(--gold);
    border-color: var(--gold);
  }

  .role-toggle.active .check::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bg);
    font-size: 14px;
    font-weight: bold;
  }

  .role-toggle .info {
    flex: 1;
  }

  .role-toggle .name {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--paper);
    margin-bottom: 4px;
  }

  .role-toggle .desc {
    font-size: 15px;
    line-height: 1.4;
    color: var(--text-dim);
    font-style: italic;
  }

  .role-toggle .warn {
    margin-top: 8px;
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--blood-bright);
    font-style: normal;
  }

  /* === PRIMARY BUTTON === */
  .btn-primary {
    width: 100%;
    padding: 22px;
    background: var(--blood);
    color: var(--button-text);
    border: none;
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    transition: all 0.3s ease;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(244, 236, 216, 0.2);
    pointer-events: none;
  }

  .btn-primary:active {
    background: var(--blood-bright);
    transform: scale(0.99);
  }

  .btn-primary:disabled {
    background: var(--bg-2);
    color: var(--ash);
    cursor: not-allowed;
  }

  .btn-secondary {
    width: 100%;
    padding: 18px;
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold-dim);
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-secondary:active {
    background: var(--gold);
    color: var(--bg);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: none;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 12px 0;
  }

  /* === DEAL SCREEN === */
  .deal-screen {
    min-height: calc(100vh - 40px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    position: relative;
  }

  .player-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ash);
    letter-spacing: 0.3em;
    margin-bottom: 8px;
  }

  .deal-screen .instruction {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--text-dim);
    margin-bottom: 40px;
    line-height: 1.4;
    max-width: 360px;
  }

  .player-name-big {
    font-family: 'Oswald', sans-serif;
    font-weight: 300;
    font-size: 48px;
    color: var(--paper);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    margin-bottom: 8px;
    line-height: 1;
  }

  .passing-hint {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--gold-dim);
    font-size: 16px;
    margin-bottom: 48px;
  }

  .reveal-btn {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--reveal-grad-start), var(--reveal-grad-end));
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    transition: all 0.3s ease;
    box-shadow: var(--reveal-shadow);
    margin-bottom: 48px;
  }

  .reveal-btn::before {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    border: 1px solid var(--gold-dim);
  }

  .reveal-btn::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid var(--border-softer);
    animation: pulse 2.5s infinite ease-in-out;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.08); opacity: 0.2; }
  }

  .reveal-btn:active {
    transform: scale(0.96);
  }

  /* === ROLE REVEAL === */
  .role-card {
    animation: cardReveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    width: 100%;
    max-width: 380px;
    background: linear-gradient(to bottom, var(--card-bg-start), var(--card-bg-end));
    color: var(--card-text);
    padding: 40px 32px;
    position: relative;
    margin-bottom: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 120px rgba(139, 26, 26, 0.2);
  }

  @keyframes cardReveal {
    from {
      opacity: 0;
      transform: rotateY(90deg) scale(0.8);
    }
    to {
      opacity: 1;
      transform: rotateY(0) scale(1);
    }
  }

  .role-card::before, .role-card::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    border: 2px solid var(--card-accent);
  }
  .role-card::before { top: 12px; left: 12px; border-right: none; border-bottom: none; }
  .role-card::after { bottom: 12px; right: 12px; border-left: none; border-top: none; }

  .role-card .kicker {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    text-align: center;
    color: var(--card-accent);
    margin-bottom: 20px;
  }

  .role-card .role-emblem {
    text-align: center;
    font-size: 56px;
    margin-bottom: 8px;
    filter: sepia(0.3);
  }

  .role-card .role-title {
    font-family: 'Oswald', sans-serif;
    font-size: 38px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-align: center;
    color: var(--card-text);
    margin-bottom: 4px;
    line-height: 1;
  }

  .role-card .role-side {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    text-align: center;
    color: var(--card-accent);
    margin-bottom: 20px;
  }

  .role-card .divider {
    height: 1px;
    background: var(--card-text);
    opacity: 0.3;
    margin: 20px 0;
  }

  .role-card .role-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    line-height: 1.5;
    color: var(--card-text);
    text-align: center;
  }

  .role-card .team-list {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px dashed var(--card-text);
  }

  .role-card .team-list .t-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--card-accent);
    margin-bottom: 8px;
    text-align: center;
  }

  .role-card .team-names {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    text-align: center;
    font-size: 17px;
    color: var(--card-text);
  }

  /* === HOST SCREEN === */
  .host-header {
    padding: 20px 0;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border-soft);
  }

  .phase-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    background: var(--bg-2);
    border: 1px solid var(--gold-dim);
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .phase-badge.night { border-color: #4a5a8e; color: #8ea5d1; }
  .phase-badge.day { border-color: var(--gold); color: var(--gold); }
  .phase-badge.vote { border-color: var(--blood-bright); color: var(--blood-bright); }

  .phase-title {
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: var(--paper);
    line-height: 1;
  }

  .step-card {
    background: var(--bg-2);
    border-left: 2px solid var(--gold-dim);
    padding: 20px 18px;
    margin-bottom: 12px;
    position: relative;
  }

<body>
<button class="theme-toggle" id="themeToggle" aria-label="Сменить тему" title="Сменить тему">
  <span id="themeIcon">☾</span>
</button>
<div class="app" id="app"></div>

<script>
// ============================================================
// ROLE DEFINITIONS
// ============================================================
const ROLES = {
  mafia: {
    id: 'mafia', name: 'Мафия', side: 'Тёмная сторона', emblem: '🔪',
    desc: 'Каждую ночь вы вместе с подельниками выбираете жертву. Днём притворяйтесь мирным жителем и сбивайте с толку.',
    color: 'mafia'
  },
  civilian: {
    id: 'civilian', name: 'Мирный', side: 'Светлая сторона', emblem: '☗',
    desc: 'У вас нет особых способностей. Ваше оружие — логика, интуиция и красноречие. Найдите мафию, пока не поздно.',
    color: 'civilian'
  },
  sheriff: {
    id: 'sheriff', name: 'Шериф', side: 'Светлая сторона', emblem: '✦',
    desc: 'Каждую ночь вы проверяете одного игрока — ведущий покажет, мафия он или нет. Но если мафия узнает вас — вы труп.',
    color: 'sheriff'
  },
  doctor: {
    id: 'doctor', name: 'Доктор', side: 'Светлая сторона', emblem: '✚',
    desc: 'Каждую ночь вы лечите одного игрока. Если мафия выберет его — он выживет. Себя можно лечить только один раз за игру.',
    color: 'doctor'
  },
  don: {
    id: 'don', name: 'Дон Мафии', side: 'Тёмная сторона', emblem: '♛',
    desc: 'Вы — глава мафии. Кроме участия в убийствах, каждую ночь можете проверить, является ли игрок Шерифом.',
    color: 'don'
  },
  maniac: {
    id: 'maniac', name: 'Маньяк', side: 'Одиночка', emblem: '☠',
    desc: 'Вы играете сами за себя. Каждую ночь убиваете одного игрока. Побеждаете, если останетесь с одним мирным один на один.',
    color: 'maniac'
  },
  whore: {
    id: 'whore', name: 'Путана', side: 'Светлая сторона', emblem: '❀',
    desc: 'Каждую ночь вы выбираете игрока — он «спит» у вас и не может применить свою ночную способность. Осторожно: если заблокируете мафию, можете сами погибнуть.',
    color: 'whore'
  }
};

// ============================================================
// STATE
// ============================================================
const state = {
  screen: 'home',
  playerCount: 8,
  optionalRoles: { don: true, doctor: true, maniac: false, whore: false },
  players: [],         // [{name, role, alive}]
  dealIndex: 0,        // current player getting role
  dealPhase: 'await',  // 'await' | 'shown'
  // host state
  day: 1,
  phase: 'night',      // 'night' | 'day' | 'vote'
  stepIndex: 0,
  timer: { seconds: 60, running: false, interval: null },
  theme: 'light',      // 'light' | 'dark'

  // ==== Выборы на ТЕКУЩЕЙ ночи ====
  // null — ещё не выбрано, -1 — «пропустить/никого», число — индекс игрока в state.players
  night: {
    mafiaTarget: null,
    donCheck: null,
    whoreTarget: null,
    doctorTarget: null,
    sheriffCheck: null,
    maniacTarget: null,
    // Результат резолва (заполняется на шаге «Итог ночи»)
    resolved: null
  },

  // ==== История для проверки ограничений ====
  doctorHistory: [],   // массив индексов целей доктора по ночам (для «не два раза подряд»)
  doctorSelfUsed: false, // уже лечил ли себя
  whoreHistory: [],    // история Путаны (для «не два раза подряд»)

  // ==== Результаты дня ====
  // Казнённый этим днём (для голосования). null — никто, число — индекс.
  dayVoteKilled: null
};

// Создаёт чистый объект ночи (вызывается при переходе на новую ночь).
function resetNightSelections() {
  state.night = {
    mafiaTarget: null,
    donCheck: null,
    whoreTarget: null,
    doctorTarget: null,
    sheriffCheck: null,
    maniacTarget: null,
    resolved: null,
    applied: false
  };
  state.dayVoteKilled = null;
}

// Применяет тему (CSS-атрибут на <html>). Storage намеренно не используется,
// т.к. артефакты в Claude.ai не поддерживают localStorage.
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme === 'dark' ? 'dark' : 'light');
}

function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  applyTheme();
  render();
}

// ============================================================
// HELPERS
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Минимум мирных, который мы гарантируем.
// Игра должна быть интересной — нужно минимум 2 мирных, чтобы было за кого говорить.
const MIN_CIVILIANS = 2;

function calcRoleDistribution() {
  const n = state.playerCount;

  // Классика: мафия ≈ 1/3 от стола, округлено вниз, минимум 1.
  // При 4 — 1, при 5–7 — 2 (но минимум 1 из формулы даст 1-2, так что корректируем).
  let totalMafiaSide = Math.max(1, Math.floor(n / 3));
  // При 4-5 игроках — только 1 мафия, иначе слишком жёстко.
  if (n <= 5) totalMafiaSide = 1;

  // Don — один из рядов мафии (не добавочный). Только если в мафии ≥ 2 человек.
  let donCount = (state.optionalRoles.don && totalMafiaSide >= 2) ? 1 : 0;
  let mafiaCount = totalMafiaSide - donCount;

  const sheriffCount = 1;
  let doctorCount = state.optionalRoles.doctor ? 1 : 0;
  let maniacCount = (state.optionalRoles.maniac && n >= 8) ? 1 : 0;
  let whoreCount = (state.optionalRoles.whore && n >= 8) ? 1 : 0;

  // Проверяем, что мирных останется хотя бы MIN_CIVILIANS.
  // Если не хватает — последовательно срезаем опциональные роли.
  // Приоритет сохранения: Дон > Доктор > Маньяк > Путана.
  const checkCivilians = () => n - (mafiaCount + donCount + sheriffCount + doctorCount + maniacCount + whoreCount);
  while (checkCivilians() < MIN_CIVILIANS) {
    if (whoreCount > 0) { whoreCount = 0; continue; }
    if (maniacCount > 0) { maniacCount = 0; continue; }
    if (doctorCount > 0) { doctorCount = 0; continue; }
    if (donCount > 0) { donCount = 0; mafiaCount = totalMafiaSide; continue; }
    // Если даже без опциональных ролей мирных не хватает — уменьшаем мафию до 1.
    if (mafiaCount > 1) { mafiaCount--; continue; }
    break; // крайний случай — что есть, то есть
  }

  const civilianCount = Math.max(0, checkCivilians());

  return {
    mafia: mafiaCount,
    don: donCount,
    sheriff: sheriffCount,
    doctor: doctorCount,
    maniac: maniacCount,
    whore: whoreCount,
    civilian: civilianCount,
    totalMafiaSide: mafiaCount + donCount
  };
}

// Проверяет, можно ли включить опциональную роль при текущих настройках
// (учитывая не только число игроков, но и другие выбранные роли).
function canEnableRole(roleId) {
  const n = state.playerCount;
  if (roleId === 'don') return n >= 6;
  if (roleId === 'maniac') return n >= 8;
  if (roleId === 'whore') return n >= 8;
  return true;
}

// Проверяет, будет ли роль реально выдана при текущих настройках —
// т.е. её не вытеснит балансировщик.
function isRoleEffective(roleId) {
  const dist = calcRoleDistribution();
  return dist[roleId] > 0;
}

function dealRoles() {
  const dist = calcRoleDistribution();
  const pool = [];
  for (let i = 0; i < dist.mafia; i++) pool.push('mafia');
  for (let i = 0; i < dist.don; i++) pool.push('don');
  for (let i = 0; i < dist.sheriff; i++) pool.push('sheriff');
  for (let i = 0; i < dist.doctor; i++) pool.push('doctor');
  for (let i = 0; i < dist.maniac; i++) pool.push('maniac');
  for (let i = 0; i < dist.whore; i++) pool.push('whore');
  for (let i = 0; i < dist.civilian; i++) pool.push('civilian');

  const shuffled = shuffle(pool);
  state.players = state.players.map((p, i) => ({
    ...p,
    role: shuffled[i],
    alive: true
  }));
}

function getMafiaNames() {
  return state.players
    .filter(p => p.role === 'mafia' || p.role === 'don')
    .map(p => p.name);
}

let _lastScreen = null;
let _lastDealKey = null;
function render() {
  const app = document.getElementById('app');
  const screenChanged = _lastScreen !== state.screen;
  // Для экрана раздачи ролей также анимируем смену игрока и фазы (await↔shown)
  const dealKey = state.screen === 'deal' ? `${state.dealIndex}:${state.dealPhase}` : null;
  const dealChanged = dealKey !== null && _lastDealKey !== dealKey;

  app.innerHTML = '';
  if (state.screen === 'home') renderHome();
  else if (state.screen === 'names') renderNames();
  else if (state.screen === 'deal') renderDeal();
  else if (state.screen === 'host') renderHost();
  else if (state.screen === 'gameover') renderGameOver();
  else if (state.screen === 'rules') renderRules();
  updateThemeIcon();

  // Анимация появления — при смене экрана, либо при смене игрока/фазы на экране раздачи.
  // Без этого весь host-экран мерцает на каждый шаг/тап.
  if (screenChanged || dealChanged) {
    _lastScreen = state.screen;
    _lastDealKey = dealKey;
    const firstChild = app.firstElementChild;
    if (firstChild) {
      firstChild.classList.add('screen-enter');
    }
    if (screenChanged) window.scrollTo(0, 0);
  }
}

// Обновляет иконку переключателя темы.
function updateThemeIcon() {
  const icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = state.theme === 'light' ? '☾' : '☀';
}

// ============================================================
// NIGHT RESOLVER
// ============================================================

// Возвращает роль игрока по индексу, или null если индекс невалиден.
function getRole(idx) {
  if (idx == null || idx < 0) return null;
  const p = state.players[idx];
  return p ? p.role : null;
}

// "Mafia team" — обычные мафиози и Дон.
function isMafiaRole(role) {
  return role === 'mafia' || role === 'don';
}

// Проверка: можно ли Доктору лечить этого игрока этой ночью?
// Возвращает { ok: bool, reason: string }.
function canDoctorHeal(targetIdx) {
  if (targetIdx == null || targetIdx < 0) return { ok: true, reason: '' };
  const target = state.players[targetIdx];
  if (!target) return { ok: false, reason: 'Игрока нет' };

  // Две ночи подряд одного игрока нельзя
  const lastTarget = state.doctorHistory[state.doctorHistory.length - 1];
  if (lastTarget === targetIdx) {
    return { ok: false, reason: 'Этого игрока Доктор лечил прошлой ночью' };
  }
  // Себя — только один раз за игру
  const doctorIdx = state.players.findIndex(p => p.role === 'doctor');
  if (targetIdx === doctorIdx && state.doctorSelfUsed) {
    return { ok: false, reason: 'Себя можно лечить только один раз за игру' };
  }
  return { ok: true, reason: '' };
}

// Можно ли Путане ходить к этому игроку этой ночью?
function canWhoreGo(targetIdx) {
  if (targetIdx == null || targetIdx < 0) return { ok: true, reason: '' };
  const whoreIdx = state.players.findIndex(p => p.role === 'whore');
  if (targetIdx === whoreIdx) {
    return { ok: false, reason: 'К себе Путана не ходит' };
  }
  const lastTarget = state.whoreHistory[state.whoreHistory.length - 1];
  if (lastTarget === targetIdx) {
    return { ok: false, reason: 'К этому игроку Путана ходила прошлой ночью' };
  }
  return { ok: true, reason: '' };
}

// Главный резолвер. Возвращает объект с:
//   killed: [idx, ...]              — кто реально умер этой ночью
//   savedByDoctor: idx | null       — кого спас Доктор (если он спас от мафии/маньяка)
//   blocked: { role: string, ... }  — чьи действия были заблокированы Путаной
//   sheriffResult: 'mafia'|'notMafia'|null  — результат проверки Шерифа
//   donResult: 'sheriff'|'notSheriff'|null  — результат проверки Дона
function resolveNight() {
  const n = state.night;
  const isFirstNight = state.day === 1;

  const result = {
    killed: [],
    savedByDoctor: null,
    blocked: {},
    sheriffResult: null,
    donResult: null,
    whoreDied: false
  };

  // 1) Применяем блокировки Путаны
  // Путана блокирует цель: её ночное действие не срабатывает.
  // Если цель Путаны — мафиози, Путана сама погибает (вместе с мафией, если мафия сегодня убивает).
  let mafiaBlocked = false;
  let maniacBlocked = false;
  let doctorBlocked = false;
  let sheriffBlocked = false;
  let donBlocked = false;

  if (n.whoreTarget != null && n.whoreTarget >= 0) {
    const blockedRole = getRole(n.whoreTarget);
    if (isMafiaRole(blockedRole)) {
      // Блокирует мафиози (любого)
      mafiaBlocked = true;
      if (blockedRole === 'don') donBlocked = true;
      result.blocked.mafia = true;
      // Путана умирает, потому что "застала мафиози"
      result.whoreDied = true;
    } else if (blockedRole === 'maniac') {
      maniacBlocked = true;
      result.blocked.maniac = true;
    } else if (blockedRole === 'doctor') {
      doctorBlocked = true;
      result.blocked.doctor = true;
    } else if (blockedRole === 'sheriff') {
      sheriffBlocked = true;
      result.blocked.sheriff = true;
    }
    // Мирные, путана — блокировка не имеет эффекта (у них нет ночной способности)
  }

  // 2) Проверка Шерифа (информационное действие — не меняет живых)
  if (n.sheriffCheck != null && n.sheriffCheck >= 0 && !sheriffBlocked) {
    const checkedRole = getRole(n.sheriffCheck);
    // Дон показывается как мафия, маньяк — как НЕ мафия, остальные мафиози — как мафия.
    result.sheriffResult = isMafiaRole(checkedRole) ? 'mafia' : 'notMafia';
  }

  // 3) Проверка Дона
  if (n.donCheck != null && n.donCheck >= 0 && !donBlocked) {
    const checkedRole = getRole(n.donCheck);
    result.donResult = checkedRole === 'sheriff' ? 'sheriff' : 'notSheriff';
  }

  // 4) Определяем цель мафии (с учётом блокировки)
  // На первой ночи мафия не убивает — игнорируем даже если цель выбрана.
  let mafiaVictim = null;
  if (!isFirstNight && !mafiaBlocked && n.mafiaTarget != null && n.mafiaTarget >= 0) {
    mafiaVictim = n.mafiaTarget;
  }

  // 5) Определяем цель маньяка
  let maniacVictim = null;
  if (!maniacBlocked && n.maniacTarget != null && n.maniacTarget >= 0) {
    maniacVictim = n.maniacTarget;
  }

  // 6) Доктор — кого он лечит (с учётом блокировки)
  let healed = null;
  if (!doctorBlocked && n.doctorTarget != null && n.doctorTarget >= 0) {
    healed = n.doctorTarget;
  }

  // 7) Применяем смерти
  const killedSet = new Set();
  if (mafiaVictim != null) {
    if (healed === mafiaVictim) {
      result.savedByDoctor = mafiaVictim;
    } else {
      killedSet.add(mafiaVictim);
    }
  }
  if (maniacVictim != null) {
    if (healed === maniacVictim) {
      // Доктор лечит и от маньяка (классика)
      if (result.savedByDoctor == null) result.savedByDoctor = maniacVictim;
    } else {
      killedSet.add(maniacVictim);
    }
  }
  // Путана умирает если заблокировала мафию (независимо от того, убивала ли мафия)
  if (result.whoreDied && !isFirstNight) {
    const whoreIdx = state.players.findIndex(p => p.role === 'whore' && p.alive);
    if (whoreIdx !== -1) killedSet.add(whoreIdx);
  } else {
    // На первой ночи мафия не убивает — значит, путана "застала мафиози",
    // но они не убивают её, т.к. ещё не действуют.
    result.whoreDied = false;
  }

  result.killed = Array.from(killedSet);
  return result;
}

// Применяет результаты ночи: убивает игроков, обновляет историю доктора/путаны.
// Идемпотентна: повторный вызов ничего не испортит.
function applyNightResolution() {
  const r = state.night.resolved;
  if (!r) return;
  if (state.night.applied) return; // уже применили
  state.night.applied = true;
  for (const idx of r.killed) {
    state.players[idx].alive = false;
  }
  // Обновляем историю Доктора
  if (state.night.doctorTarget != null && state.night.doctorTarget >= 0) {
    state.doctorHistory.push(state.night.doctorTarget);
    const doctorIdx = state.players.findIndex(p => p.role === 'doctor');
    if (state.night.doctorTarget === doctorIdx) state.doctorSelfUsed = true;
  } else {
    state.doctorHistory.push(null);
  }
  // Обновляем историю Путаны
  if (state.night.whoreTarget != null && state.night.whoreTarget >= 0) {
    state.whoreHistory.push(state.night.whoreTarget);
  } else {
    state.whoreHistory.push(null);
  }
}

// ============================================================
function getNightSteps() {
  const steps = [];
  const hasAlive = (role) => state.players.some(p => p.role === role && p.alive);
  const hasMafia = hasAlive('mafia') || hasAlive('don');
  const isFirstNight = state.day === 1;

  steps.push({
    title: 'Город засыпает',
    say: 'Город засыпает. Все закрывают глаза. Прошу тишины.',
    hint: 'Дождись полной тишины. Попроси игроков закрыть глаза и положить руки на стол — ритмичное постукивание скроет шорохи от активных ролей.'
  });

  // Первая ночь: мафия знакомится (без убийства)
  if (isFirstNight && hasMafia) {
    steps.push({
      title: 'Мафия знакомится',
      cls: 'mafia-action',
      say: 'Мафия, просыпайся. Познакомьтесь друг с другом молча — взглядом и кивком.',
      hint: 'Дай мафиози 10–15 секунд узнать друг друга. В эту ночь мафия НЕ убивает — первого жителя убивают со второй ночи.'
    });
    steps.push({ title: 'Мафия засыпает', say: 'Мафия, закрой глаза.', hint: '' });
  }

  // Путана (ходит первой — блокирует способности)
  if (state.optionalRoles.whore && hasAlive('whore')) {
    steps.push({
      title: 'Путана просыпается',
      cls: 'whore-action',
      say: 'Путана, открой глаза. К кому идёшь этой ночью?',
      hint: 'Выбери цель ниже. Её ночная способность не сработает. Если к мафиози — Путана погибает вместе с ними. Нельзя ходить к одному игроку две ночи подряд.',
      action: {
        type: 'pickTarget',
        field: 'whoreTarget',
        role: 'whore',
        label: 'К кому идёт Путана',
        allowSkip: false,
        validate: (idx) => canWhoreGo(idx)
      }
    });
    steps.push({ title: 'Путана засыпает', say: 'Путана, закрой глаза.', hint: '' });
  }

  // Мафия убивает (не на первой ночи)
  if (!isFirstNight && hasMafia) {
    steps.push({
      title: 'Мафия просыпается',
      cls: 'mafia-action',
      say: 'Мафия, просыпайся. Жестами выберите жертву.',
      hint: 'Дождись единогласного решения. Если мафия не договорилась — нажми «Пропустить», и ночь пройдёт без убийства от мафии.',
      action: {
        type: 'pickTarget',
        field: 'mafiaTarget',
        role: 'mafia',
        label: 'Жертва мафии',
        allowSkip: true,
        skipLabel: 'Мафия не договорилась'
      }
    });
  }

  // Дон ищет Шерифа (каждую ночь, включая первую)
  if (state.optionalRoles.don && hasAlive('don')) {
    steps.push({
      title: 'Дон ищет Шерифа',
      cls: 'mafia-action',
      say: 'Дон, укажи, кого проверяешь.',
      hint: 'Выбери цель. Приложение покажет результат — Шериф или нет. Покажи Дону ответ жестом: кивок (да) / покачивание (нет).',
      action: {
        type: 'pickTarget',
        field: 'donCheck',
        role: 'don',
        label: 'Проверка Дона',
        allowSkip: true,
        skipLabel: 'Не проверять',
        showResult: (idx) => {
          const role = getRole(idx);
          return role === 'sheriff' ? '✓ Это Шериф' : '✗ Не Шериф';
        }
      }
    });
  }

  if (!isFirstNight && hasMafia) {
    steps.push({ title: 'Мафия засыпает', say: 'Мафия, закрой глаза.', hint: '' });
  } else if (isFirstNight && state.optionalRoles.don && hasAlive('don')) {
    steps.push({ title: 'Дон засыпает', say: 'Дон, закрой глаза.', hint: '' });
  }

  // Доктор
  if (state.optionalRoles.doctor && hasAlive('doctor')) {
    steps.push({
      title: 'Доктор просыпается',
      cls: 'doctor-action',
      say: 'Доктор, просыпайся. Кого лечишь этой ночью?',
      hint: 'Ограничения: нельзя лечить одного игрока две ночи подряд; себя — только один раз за игру. Доктор лечит и от мафии, и от маньяка.',
      action: {
        type: 'pickTarget',
        field: 'doctorTarget',
        role: 'doctor',
        label: 'Кого лечит Доктор',
        allowSkip: true,
        skipLabel: 'Не лечить никого',
        validate: (idx) => canDoctorHeal(idx)
      }
    });
    steps.push({ title: 'Доктор засыпает', say: 'Доктор, закрой глаза.', hint: '' });
  }

  // Шериф
  if (hasAlive('sheriff')) {
    steps.push({
      title: 'Шериф просыпается',
      cls: 'sheriff-action',
      say: 'Шериф, просыпайся. Кого проверяешь?',
      hint: 'Выбери цель. Приложение покажет результат. Покажи Шерифу жестом: палец вверх — НЕ мафия, вниз — мафия.',
      action: {
        type: 'pickTarget',
        field: 'sheriffCheck',
        role: 'sheriff',
        label: 'Проверка Шерифа',
        allowSkip: true,
        skipLabel: 'Не проверять',
        showResult: (idx) => {
          const role = getRole(idx);
          // Дон = мафия, маньяк = не мафия, остальные по факту
          return isMafiaRole(role) ? '🔴 МАФИЯ' : '🟢 НЕ МАФИЯ';
        }
      }
    });
    steps.push({ title: 'Шериф засыпает', say: 'Шериф, закрой глаза.', hint: '' });
  }

  // Маньяк
  if (state.optionalRoles.maniac && hasAlive('maniac')) {
    steps.push({
      title: 'Маньяк просыпается',
      cls: 'maniac-action',
      say: 'Маньяк, открой глаза. Кого убиваешь?',
      hint: 'Если Маньяк заблокирован Путаной — он не убивает. Доктор лечит и от маньяка.',
      action: {
        type: 'pickTarget',
        field: 'maniacTarget',
        role: 'maniac',
        label: 'Жертва Маньяка',
        allowSkip: true,
        skipLabel: 'Маньяк не убивает'
      }
    });
    steps.push({ title: 'Маньяк засыпает', say: 'Маньяк, закрой глаза.', hint: '' });
  }

  // КРИТИЧЕСКИЙ ШАГ: авторезолв
  steps.push({
    title: 'Итог ночи',
    say: '(про себя) Проверь результат.',
    hint: 'Приложение автоматически подсчитало результат с учётом всех блокировок, лечения и маньяка. Нажми «Далее», чтобы применить смерти и перейти к объявлению.',
    action: { type: 'resolveNight' }
  });

  steps.push({
    title: 'Город просыпается',
    say: 'Город просыпается. Открывайте глаза.',
    hint: 'Объявляй результаты драматично: «Этой ночью на углу улиц...». Если никто не умер — «эта ночь прошла спокойно».'
  });

  return steps;
}

function getDaySteps() {
  const isFirstDay = state.day === 1;
  const steps = [];
  const resolved = state.night.resolved;

  // Первый шаг — динамическая сводка о смертях
  let victimsText = '';
  let victimsSay = '';
  if (isFirstDay) {
    victimsSay = 'Доброе утро, город. Первый день — все живы. Пора знакомиться.';
    victimsText = 'Первый день — смертей нет. Все живы.';
  } else if (resolved && resolved.killed.length === 0) {
    victimsSay = `День ${state.day}. Этой ночью никто не погиб.`;
    victimsText = 'Эта ночь прошла спокойно. Все живы.';
  } else if (resolved && resolved.killed.length > 0) {
    const names = resolved.killed.map(idx => state.players[idx].name).join(', ');
    victimsSay = `День ${state.day}. Этой ночью погиб${resolved.killed.length > 1 ? 'ли' : ''}: ${names}.`;
    victimsText = `Погибшие: ${names}`;
    if (resolved.savedByDoctor != null) {
      const savedName = state.players[resolved.savedByDoctor].name;
      victimsText += `\n(Доктор спас ${savedName})`;
    }
  } else {
    victimsSay = `Наступает день ${state.day}.`;
    victimsText = 'Результаты ночи ещё не подведены.';
  }

  steps.push({
    title: isFirstDay ? 'Утро первого дня' : 'Объявление жертв',
    say: victimsSay,
    hint: isFirstDay
      ? 'Переходи к обсуждению.'
      : 'По классике — погибший может открыть свою роль, но НЕ намекать на убийцу. Дай 30 секунд на последнее слово.',
    timerSeconds: isFirstDay ? null : 30,
    timerLabel: 'Последнее слово погибшего',
    summary: victimsText
  });

  steps.push({
    title: 'Обсуждение',
    say: 'Время обсудить. У каждого минута, чтобы высказаться по кругу.',
    hint: isFirstDay
      ? 'Первый день обычно короткий — игроки почти ничего не знают. Начинайте с любого.'
      : 'Начни с игрока слева от первого умершего. Строго следи за таймингом. Никто не перебивает.',
    timerSeconds: 60,
    timerLabel: 'Минута на игрока'
  });

  steps.push({
    title: 'Выдвижение кандидатов',
    say: 'Кого вы подозреваете? Выдвигайте кандидатов.',
    hint: 'Один игрок выдвигает одного. Сам себя — нельзя. Если никто не выдвинут — голосования не будет, сразу к ночи.'
  });

  steps.push({
    title: 'Последнее слово кандидатов',
    say: 'Каждому кандидату — 30 секунд на оправдание.',
    hint: 'Выступают в порядке выдвижения.',
    timerSeconds: 30,
    timerLabel: '30 секунд на оправдание'
  });

  return steps;
}

function getVoteSteps() {
  return [
    {
      title: 'Голосование',
      say: 'Голосуем. Поднимите руку за того, кого считаете мафией.',
      hint: 'Называй кандидатов по очереди. Каждый голосует ровно один раз, не за себя. Считай голоса вслух.'
    },
    {
      title: 'Разрешение ничьи',
      say: '(если голоса равны) Объявляю переголосование.',
      hint: `Если голоса равны: переголосование между лидерами с последним словом 20 сек. Если снова равенство — никто не уходит ИЛИ все лидеры уходят (решите до игры).`,
      timerSeconds: 20,
      timerLabel: '20 секунд на повторное оправдание'
    },
    {
      title: 'Казнь',
      say: 'Город сделал свой выбор.',
      hint: 'Выбери казнённого ниже или нажми «Никто не уходит». Ему — 30 секунд последнего слова. По классике открывает роль.',
      timerSeconds: 30,
      timerLabel: 'Последнее слово казнённого',
      action: {
        type: 'pickKilled',
        label: 'Кого казнил город',
        allowSkip: true,
        skipLabel: 'Никто не уходит'
      }
    }

}

function getCurrentSteps() {
  if (state.phase === 'night') return getNightSteps();
  if (state.phase === 'day') return getDaySteps();
  if (state.phase === 'vote') return getVoteSteps();
  return [];
}

// Проверка условий победы.
// Логика:
// — «Мафия» (mafia + don) — одна команда.
// — «Мирные» (civilian + sheriff + doctor + whore) — одна команда.
// — «Маньяк» — сам за себя.
//
// Правила:
// 1) Все мертвы → ничья.
// 2) Если мафии 0 и маньяка 0 → победили мирные.
// 3) Если мирных 0:
//    — остался только маньяк (мафия=0) → победа маньяка.
//    — осталась только мафия (маньяк=0) → победа мафии.
//    — остались мафия и маньяк → играют между собой (продолжаем), пока один не останется.
// 4) Если маньяка нет, и мафия >= мирных (паритет) → победа мафии.
// 5) Если мафии нет, маньяк и мирные:
//    — маньяк может убить только одного за ночь, голосовать нельзя ночью,
//      поэтому победа маньяка только когда мирных 0 (см. п.3) или их 1
//      и их осталось ровно 2 (маньяк + мирный): маньяк гарантированно побеждает
//      (ночью убьёт последнего, днём голосования быть не может при 2-х).
//      → Однако по классике маньяк ПОБЕЖДАЕТ уже когда мирных 1, а маньяк жив,
//        и мафии нет, т.к. он убьёт его следующей же ночью.
// 6) Если живы все три фракции — продолжаем.
function checkWinCondition() {
  const alive = state.players.filter(p => p.alive);
  const mafia = alive.filter(p => p.role === 'mafia' || p.role === 'don');
  const maniac = alive.filter(p => p.role === 'maniac');
  const civilians = alive.filter(p => p.role !== 'mafia' && p.role !== 'don' && p.role !== 'maniac');

  // 1) Все мертвы
  if (alive.length === 0) return 'draw';

  // 2) Город победил: никаких «красных» не осталось
  if (mafia.length === 0 && maniac.length === 0) return 'city';

  // 3) Остался только маньяк (в т.ч. один-на-один с мирным, когда других сил нет)
  if (mafia.length === 0 && maniac.length > 0) {
    // Маньяк побеждает когда мирных <= 1 (он ночью убьёт единственного, голосование против него не проходит)
    if (civilians.length <= 1) return 'maniac';
  }

  // 4) Остались только мафия и мирные (маньяка нет)
  if (maniac.length === 0 && mafia.length > 0) {
    // Паритет или больше — победа мафии
    if (mafia.length >= civilians.length) return 'mafia';
  }

  // 5) Маньяк, мафия, мирные — все живы. Особые случаи:
  if (mafia.length > 0 && maniac.length > 0 && civilians.length === 0) {
    // Только мафия vs маньяк — ничья продолжает игру; по классике если мафия >= 1 и маньяк 1 —
    // продолжают убивать друг друга. Для упрощения: если живых 2 (1 маньяк + 1 мафия) —
    // признаём ничью с предпочтением мафии (она убьёт его первой ночью).
    if (mafia.length >= 1) return 'mafia';
  }

  // 6) Продолжаем игру
  return null;
}

function renderHost() {
  const app = document.getElementById('app');

  // Проверяем победу перед рендером.
  const winner = checkWinCondition();
  if (winner) {
    state.winner = winner;
    state.screen = 'gameover';
    stopTimer();
    render();
    return;
  }

  const steps = getCurrentSteps();
  if (state.stepIndex >= steps.length) state.stepIndex = steps.length - 1;
  if (state.stepIndex < 0) state.stepIndex = 0;
  const step = steps[state.stepIndex];
  const isLast = state.stepIndex === steps.length - 1;

  const phaseLabel = { night: 'Ночь', day: 'День', vote: 'Голосование' }[state.phase];
  const phaseCls = state.phase;
  const aliveCount = state.players.filter(p => p.alive).length;

  // --- Собираем разметку action/summary ---
  let actionHtml = '';
  let summaryHtml = '';

  if (step.summary) {
    summaryHtml = `
      <div class="step-card" style="border-left-color: var(--blood);">
        <div class="step-title">Результат</div>
        <div class="summary-text">${step.summary.replace(/\n/g, '<br>')}</div>
      </div>
    `;
  }

  if (step.action) {
    actionHtml = renderAction(step.action);
  }

  // Первый шаг игры — первая ночь, день 1
  const isVeryFirstStep = state.stepIndex === 0 && state.phase === 'night' && state.day === 1;

  app.innerHTML = `
    <div class="screen">
      <div class="host-header">
        <div class="phase-badge ${phaseCls}">
          ${state.phase === 'night' ? '🌙' : state.phase === 'day' ? '☀' : '⚖'}
          День ${state.day} · ${phaseLabel}
        </div>
        <div class="phase-title">${step.title}</div>
      </div>

      <div class="step-card ${step.cls || ''}">
        <div class="step-num">Шаг ${state.stepIndex + 1} / ${steps.length}</div>
        <div class="step-title">Ведущий говорит</div>
        <div class="step-say">${step.say}</div>
        ${step.hint ? `<div class="step-hint">💡 ${step.hint}</div>` : ''}
      </div>

      <div class="nav-row nav-row-sticky">
        <button class="nav-btn" id="prevStep" ${isVeryFirstStep ? 'disabled' : ''}>← Назад</button>
        <button class="nav-btn primary" id="nextStep" ${isNextDisabled(step) ? 'disabled' : ''}>
          ${isLast ? nextPhaseLabel() : 'Далее →'}
        </button>
      </div>

      ${summaryHtml}
      ${actionHtml}
      ${step.timerSeconds ? renderTimer(step.timerSeconds, step.timerLabel) : ''}

      <div class="alive-counter mt-24">
        <span>Живых ${aliveCount} из ${state.playerCount}</span>
      </div>

      <div style="height: 16px;"></div>
      <button class="btn-ghost" id="endGame" style="width: 100%;">Завершить игру</button>
    </div>
  `;

  // Обработчики action (выбор цели / пропуск)
  bindActionHandlers(step);

  // Nav: Назад
  document.getElementById('prevStep').onclick = () => {
    if (state.stepIndex > 0) {
      state.stepIndex--;
    } else {
      if (state.phase === 'vote') { state.phase = 'day'; state.stepIndex = getDaySteps().length - 1; }
      else if (state.phase === 'day') { state.phase = 'night'; state.stepIndex = getNightSteps().length - 1; }
    }
    stopTimer();
    render();
  };

  // Nav: Далее
  document.getElementById('nextStep').onclick = () => {
    if (isNextDisabled(step)) return;

    // Если на этом шаге авторезолв ночи — применяем его.
    // Важно: state.night.resolved уже вычислен в renderResolveNight при рендере этого шага.
    if (step.action && step.action.type === 'resolveNight') {
      // На всякий случай пересчитываем, если resolved не проставлен
      if (!state.night.resolved) {
        state.night.resolved = resolveNight();
      }
      applyNightResolution();
      const w = checkWinCondition();
      if (w) {
        state.winner = w;
        state.screen = 'gameover';
        stopTimer();
        render();
        return;
      }
    }

    // Применяем казнь при переходе с шага казни
    if (step.action && step.action.type === 'pickKilled' && state.dayVoteKilled != null && state.dayVoteKilled >= 0) {
      state.players[state.dayVoteKilled].alive = false;
      const w = checkWinCondition();
      if (w) {
        state.winner = w;
        state.screen = 'gameover';
        stopTimer();
        render();
        return;
      }
    }

    // Переход на следующий шаг или следующую фазу
    if (state.stepIndex < steps.length - 1) {
      state.stepIndex++;
    } else {
      if (state.phase === 'night') {
        state.phase = 'day';
        state.stepIndex = 0;
      } else if (state.phase === 'day') {
        state.phase = 'vote';
        state.stepIndex = 0;
      } else if (state.phase === 'vote') {
        const w = checkWinCondition();
        if (w) {
          state.winner = w;
          state.screen = 'gameover';
        } else {
          // vote → новая ночь: очищаем ночные выборы (включая resolved).
          state.day++;
          state.phase = 'night';
          state.stepIndex = 0;
          resetNightSelections();
        }
      }
    }
    stopTimer();
    render();
  };

  document.getElementById('endGame').onclick = () => {
    if (confirm('Завершить игру и вернуться в меню?')) {
      stopTimer();
      state.screen = 'home';
      render();
    }
  };
}

// Проверяет, нужно ли заблокировать кнопку "Далее"
// (чтобы не пойти дальше пока не выбрана цель на шаге).
function isNextDisabled(step) {
  if (!step.action) return false;
  const a = step.action;
  if (a.type === 'pickTarget') {
    const val = state.night[a.field];
    return val === null; // -1 означает "пропустить" — это валидный выбор
  }
  // pickKilled и resolveNight — не блокируем, можно идти дальше всегда
  return false;
}

// ============================================================
// ACTION RENDERING (выбор целей, резолв и т.п.)
// ============================================================
function renderAction(action) {
  if (action.type === 'pickTarget') return renderPickTarget(action);
  if (action.type === 'pickKilled') return renderPickKilled(action);
  if (action.type === 'resolveNight') return renderResolveNight();
  return '';
}

// Рендер сетки выбора цели + кнопка "пропустить"
function renderPickTarget(action) {
  const selected = state.night[action.field];
  const alive = state.players.filter(p => p.alive);
  const validation = action.validate ? action.validate(selected) : { ok: true };

  // Результат проверки (для Шерифа и Дона) — показываем только после выбора
  let resultHtml = '';
  if (action.showResult && selected != null && selected >= 0) {
    resultHtml = `<div class="action-result">${action.showResult(selected)}</div>`;
  }

  // Предупреждение о невалидном выборе
  let warnHtml = '';
  if (!validation.ok && selected != null && selected >= 0) {
    warnHtml = `<div class="action-warn">⚠ ${validation.reason}</div>`;
  }

  return `
    <div class="step-card action-card">
      <div class="step-title">${action.label}</div>
      <div class="target-grid">
        ${state.players.map((p, i) => {
          if (!p.alive) return '';
          const isSelected = selected === i;
          return `
            <div class="target-chip ${isSelected ? 'selected' : ''}" data-target-idx="${i}" data-field="${action.field}">
              ${p.name}
            </div>
          `;
        }).join('')}
      </div>
      ${action.allowSkip ? `
        <button class="target-skip ${selected === -1 ? 'selected' : ''}" data-skip data-field="${action.field}">
          ${action.skipLabel || 'Пропустить'}
        </button>
      ` : ''}
      ${resultHtml}
      ${warnHtml}
    </div>
  `;
}

// Рендер выбора казнённого (переиспользует pickTarget, но пишет в state.dayVoteKilled)
function renderPickKilled(action) {
  const selected = state.dayVoteKilled;
  return `
    <div class="step-card action-card">
      <div class="step-title">${action.label}</div>
      <div class="target-grid">
        ${state.players.map((p, i) => {
          if (!p.alive) return '';
          const isSelected = selected === i;
          return `
            <div class="target-chip ${isSelected ? 'selected' : ''}" data-killed-idx="${i}">
              ${p.name}
            </div>
          `;
        }).join('')}
      </div>
      <button class="target-skip ${selected === -1 ? 'selected' : ''}" data-killed-skip>
        ${action.skipLabel || 'Никто не уходит'}
      </button>
    </div>
  `;
}

// Рендер итога ночи — вычисляет результат (или берёт уже посчитанный).
function renderResolveNight() {
  // Если ночь уже применена (например, пользователь вернулся назад) —
  // используем сохранённый результат, а не пересчитываем на мёртвых игроках.
  if (!state.night.applied || !state.night.resolved) {
    state.night.resolved = resolveNight();
  }
  const r = state.night.resolved;

  let html = '<div class="step-card action-card resolve-card"><div class="step-title">Автоматический итог</div>';

  if (r.killed.length === 0) {
    html += '<div class="resolve-line resolve-peaceful">☾ Ночь прошла спокойно</div>';
  } else {
    const names = r.killed.map(i => state.players[i].name).join(', ');
    html += `<div class="resolve-line resolve-death">✖ Погибли: <strong>${names}</strong></div>`;
  }

  if (r.savedByDoctor != null) {
    const name = state.players[r.savedByDoctor].name;
    html += `<div class="resolve-line resolve-saved">✚ Доктор спас: <strong>${name}</strong></div>`;
  }

  if (r.whoreDied) {
    html += `<div class="resolve-line resolve-note">❀ Путана попала к мафии и погибла</div>`;
  }

  // Показываем только ведущему: кто что проверял (уже объявлено игроку, но для контроля)
  if (r.sheriffResult) {
    const idx = state.night.sheriffCheck;
    const name = state.players[idx].name;
    html += `<div class="resolve-line resolve-info">✦ Шериф проверил ${name}: ${r.sheriffResult === 'mafia' ? '🔴 мафия' : '🟢 не мафия'}</div>`;
  }
  if (r.donResult) {
    const idx = state.night.donCheck;
    const name = state.players[idx].name;
    html += `<div class="resolve-line resolve-info">♛ Дон проверил ${name}: ${r.donResult === 'sheriff' ? '✓ Шериф' : '✗ не Шериф'}</div>`;
  }

  const blocked = [];
  if (r.blocked.mafia) blocked.push('Мафия');
  if (r.blocked.maniac) blocked.push('Маньяк');
  if (r.blocked.doctor) blocked.push('Доктор');
  if (r.blocked.sheriff) blocked.push('Шериф');
  if (blocked.length > 0) {
    html += `<div class="resolve-line resolve-note">❀ Путана заблокировала: ${blocked.join(', ')}</div>`;
  }

  html += '<div class="resolve-hint">Нажми «Далее», чтобы применить результат и перейти к объявлению.</div>';
  html += '</div>';
  return html;
}

// Подключает обработчики к элементам action после рендера
function bindActionHandlers(step) {
  if (!step.action) return;

  // Выбор цели (pickTarget)
  document.querySelectorAll('[data-target-idx]').forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.targetIdx);
      const field = el.dataset.field;
      state.night[field] = idx;
      render();
    };
  });
  document.querySelectorAll('[data-skip]').forEach(el => {
    el.onclick = () => {
      const field = el.dataset.field;
      state.night[field] = -1; // -1 = пропустить
      render();
    };
  });

  // Выбор казнённого (pickKilled)
  document.querySelectorAll('[data-killed-idx]').forEach(el => {
    el.onclick = () => {
      state.dayVoteKilled = parseInt(el.dataset.killedIdx);
      render();
    };
  });
  const skipKilled = document.querySelector('[data-killed-skip]');
  if (skipKilled) {
    skipKilled.onclick = () => {
      state.dayVoteKilled = -1;
      render();
    };
  }
}

function nextPhaseLabel() {
  if (state.phase === 'night') return 'К дню →';
  if (state.phase === 'day') return 'К голосованию →';
  if (state.phase === 'vote') return `Ночь ${state.day + 1} →`;
  return 'Далее →';
}

// ============================================================
// TIMER
// ============================================================

// Отслеживаем, на каком шаге был последний ресет, чтобы не ресетить повторно
// при обновлениях внутри того же шага.
let lastTimerStepKey = null;

// Web Audio API — тихий "тик" и финальный "гонг".
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { return null; }
  }
  return audioCtx;
}

function playTick(isFinal) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  // На iOS контекст может быть suspended — разбудим при первом тапе пользователя.
  if (ctx.state === 'suspended') ctx.resume();

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);

  if (isFinal) {
    // Финальный сигнал — две ноты, колокольный
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.6);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.8);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.8);
  } else {
    // Короткий тик
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, ctx.currentTime);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.12);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.12);
  }
}

// Обновляет только цифры в DOM (без полного render).
function updateTimerDisplay() {
  const el = document.querySelector('.timer-display');
  if (!el) return;
  const s = state.timer.seconds;
  el.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  el.classList.toggle('warning', s > 0 && s <= 5);
  el.classList.toggle('caution', s > 5 && s <= 10);
}

// Обновляет только надпись на кнопке старт/пауза.
function updateTimerToggleBtn() {
  const btn = document.getElementById('timerToggle');
  if (btn) btn.textContent = state.timer.running ? '⏸ Пауза' : '▶ Старт';
}

function formatTime(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

// renderTimer теперь принимает preset (нужные секунды для текущего шага)
// и автоматически сбрасывает таймер на preset при смене шага.
function renderTimer(presetSeconds, presetLabel) {
  const stepKey = `${state.phase}:${state.day}:${state.stepIndex}`;
  // При смене шага — сбрасываем таймер на preset и останавливаем.
  if (lastTimerStepKey !== stepKey) {
    lastTimerStepKey = stepKey;
    stopTimer();
    state.timer.seconds = presetSeconds;
    state.timer.preset = presetSeconds;
  }

  const s = state.timer.seconds;
  const preset = state.timer.preset || presetSeconds;
  const cls = s > 0 && s <= 5 ? 'warning' : (s > 5 && s <= 10 ? 'caution' : '');

  // Подключаем обработчики после вставки в DOM.
  setTimeout(() => {
    const minus = document.getElementById('timerMinus');
    const plus = document.getElementById('timerPlus');
    const reset = document.getElementById('timerReset');
    const toggle = document.getElementById('timerToggle');
    if (minus) minus.onclick = () => adjustTimer(-10);
    if (plus) plus.onclick = () => adjustTimer(+10);
    if (reset) reset.onclick = () => {
      stopTimer();
      state.timer.seconds = preset;
      updateTimerDisplay();
      updateTimerToggleBtn();
    };
    if (toggle) toggle.onclick = () => {
      // Важно: первый тап разбудит аудиоконтекст на iOS
      getAudioCtx();
      if (state.timer.running) stopTimer(); else startTimer();
      updateTimerToggleBtn();
    };
  }, 0);

  return `
    <div class="step-card timer-card" style="border-left-color: var(--gold);">
      <div class="step-title">${presetLabel || 'Таймер'}</div>
      <div class="timer-display ${cls}">${formatTime(s)}</div>
      <div class="timer-controls">
        <button class="nav-btn" id="timerMinus">−10с</button>
        <button class="nav-btn primary" id="timerToggle">${state.timer.running ? '⏸ Пауза' : '▶ Старт'}</button>
        <button class="nav-btn" id="timerPlus">+10с</button>
      </div>
      <div style="height: 8px;"></div>
      <button class="btn-ghost" id="timerReset" style="width: 100%;">Сброс на ${formatTime(preset)}</button>
    </div>
  `;
}

function startTimer() {
  if (state.timer.running) return;
  // Если таймер на нуле — сбросим на preset
  if (state.timer.seconds === 0) state.timer.seconds = state.timer.preset || 60;
  state.timer.running = true;
  state.timer.interval = setInterval(() => {
    if (state.timer.seconds > 0) {
      state.timer.seconds--;
      updateTimerDisplay();
      // Тикаем на последних 5 секундах
      if (state.timer.seconds > 0 && state.timer.seconds <= 5) {
        playTick(false);
      }
      if (state.timer.seconds === 0) {
        stopTimer();
        playTick(true);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        updateTimerDisplay();
        updateTimerToggleBtn();
      }
    }
  }, 1000);
}

function stopTimer() {
  state.timer.running = false;
  if (state.timer.interval) {
    clearInterval(state.timer.interval);
    state.timer.interval = null;
  }
}

function adjustTimer(delta) {
  state.timer.seconds = Math.max(0, Math.min(600, state.timer.seconds + delta));
  updateTimerDisplay();
}

// ============================================================
// GAME OVER
// ============================================================
function renderGameOver() {
  const app = document.getElementById('app');
  const winner = state.winner;

  const verdict = {
    city: { text: 'Город<br>победил', sub: 'Мафия вычищена из города. Справедливость восторжествовала.', cls: 'city-wins' },
    mafia: { text: 'Мафия<br>победила', sub: 'Город в руках семьи. Теперь здесь правят другие законы.', cls: 'mafia-wins' },
    maniac: { text: 'Маньяк<br>победил', sub: 'Последний, кто остался в живых. Все остальные — на кладбище.', cls: 'mafia-wins' },
    draw: { text: 'Ничья', sub: 'Никто не выжил, чтобы сказать об этом. Город опустел.', cls: '' }
  }[winner];

  app.innerHTML = `
    <div class="game-over screen">
      <div class="label mb-16">Финал</div>
      <div class="verdict ${verdict.cls}">${verdict.text}</div>
      <p class="verdict-sub">${verdict.sub}</p>

      <div class="section">
        <div class="section-head">
          <span class="num">✦</span>
          <span class="label">Все участники</span>
          <span class="line"></span>
        </div>
        <div class="final-list">
          ${state.players.map(p => `
            <div class="final-item ${!p.alive ? 'dead' : ''}">
              <div class="name-col">${p.name}</div>
              <div class="role-col">${ROLES[p.role].emblem} ${ROLES[p.role].name}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <button class="btn-primary" id="newGame">Новая партия</button>
    </div>
  `;

  document.getElementById('newGame').onclick = () => {
    state.screen = 'home';
    state.day = 1;
    state.phase = 'night';
    state.stepIndex = 0;
    state.winner = null;
    state.doctorHistory = [];
    state.doctorSelfUsed = false;
    state.whoreHistory = [];
    resetNightSelections();
    render();
  };
}
